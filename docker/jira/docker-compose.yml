# Gate B — Jira API 兼容改造环境
# 与 HistoryV (8080) 并行：本 compose 使用 8090 / 3308 / 6381

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:5.7}
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pearproject
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --sql_mode=NO_ENGINE_SUBSTITUTION,STRICT_TRANS_TABLES
      - --innodb-file-format=Barracuda
      - --innodb-large-prefix=1
      - --innodb-default-row-format=DYNAMIC
    volumes:
      - jira_mysql_data:/var/lib/mysql
      - ../../data/pearproject.sql:/docker-entrypoint-initdb.d/01-pearproject.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3308:3306"

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "6381:6379"

  app:
    build:
      context: ..
      dockerfile: jira/Dockerfile
      args:
        PHP_BASE: ${PHP_BASE:-php:8.2-fpm}
    ports:
      - "8090:8090"
    volumes:
      - ../../:/app
      - ./.env.docker:/docker-env/.env.docker:ro
      - ./nginx.conf:/etc/nginx/sites-enabled/default:ro
    environment:
      PEAR_DB_HOST: mysql
      PEAR_DB_PORT: "3306"
      PEAR_DB_USER: root
      PEAR_DB_PASS: root
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  gateway:
    build:
      context: ..
      dockerfile: jira/Dockerfile
      args:
        PHP_BASE: ${PHP_BASE:-php:8.2-fpm}
    image: jira-app
    entrypoint: ["/bin/bash", "/app/docker/jira/start-gateway.sh"]
    ports:
      - "2345:2345"
    volumes:
      - ../../:/app
      - ./.env.docker:/docker-env/.env.docker:ro
    environment:
      GW_SERVER_ADDRESS: "0.0.0.0"
    depends_on:
      - app

volumes:
  jira_mysql_data:
